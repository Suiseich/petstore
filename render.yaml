services:
  - type: web
    name: petstore-backend
    runtime: docker
    plan: free
    rootDir: backend
    envVars:
      - key: DATABASE_HOST
        fromDatabase:
          name: petstore-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: petstore-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: petstore-db
          property: database
      - key: DATABASE_USERNAME
        fromDatabase:
          name: petstore-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: petstore-db
          property: password
      - key: CORS_ALLOWED_ORIGINS
        value: https://petstore-frontend.onrender.com

  - type: web
    name: petstore-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://petstore-backend.onrender.com/tayag/api/v1

databases:
  - name: petstore-db
    plan: free

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: petstore
      POSTGRES_USER: petstore
      POSTGRES_PASSWORD: petstore
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petstore -d petstore"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/petstore
      DATABASE_USERNAME: petstore
      DATABASE_PASSWORD: petstore
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/tayag/api/v1
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:

